<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>강의실 예약 시스템</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/tabler-icons.min.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f5;
      --bg-tertiary: #eeeeee;
      --bg-info: #e3f2fd;
      --bg-success: #e8f5e9;
      --bg-warning: #fff3e0;
      --bg-danger: #ffebee;
      --text-primary: #212121;
      --text-secondary: #757575;
      --text-tertiary: #9e9e9e;
      --text-info: #1976d2;
      --text-success: #388e3c;
      --text-warning: #f57c00;
      --text-danger: #d32f2f;
      --border-primary: #e0e0e0;
      --border-secondary: #bdbdbd;
      --border-tertiary: #9e9e9e;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 13px;
    }
    
    .container {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--bg-primary);
      border-bottom: 0.5px solid var(--border-primary);
      flex-wrap: wrap;
    }
    
    .header-title {
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .banner {
      flex: 1;
      min-width: 100px;
      text-align: center;
      font-size: 11px;
      border-radius: 4px;
      padding: 5px 8px;
      background: var(--bg-secondary);
      color: var(--text-secondary);
    }
    
    .badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }
    
    .badge-locked { background: var(--bg-danger); color: var(--text-danger); }
    .badge-queue { background: var(--bg-warning); color: var(--text-warning); }
    .badge-free { background: var(--bg-success); color: var(--text-success); }
    
    /* 📢 공지사항 섹션 스타일: 여러 개 등록 시 세로로 한 줄씩 정렬되도록 전면 수정 */
    .notice-section {
      max-height: 160px;
      overflow-y: auto;
      background: var(--bg-warning);
      color: var(--text-warning);
      font-size: 12px;
      border-bottom: 0.5px solid var(--border-primary);
      padding: 6px 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    
    .notice-item {
      background: rgba(255,255,255,0.5);
      padding: 6px 10px;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      width: 100%;
      border: 0.5px solid rgba(245, 124, 0, 0.2);
    }
    
    .notice-text {
      flex: 1;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }
    
    .notice-item button {
      padding: 2px 6px;
      font-size: 11px;
      background: rgba(211, 47, 47, 0.1);
      border: 0.5px solid var(--text-danger);
      color: var(--text-danger);
      border-radius: 3px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    
    .notice-item button:hover {
      background: rgba(211, 47, 47, 0.2);
    }
    
    .main-content {
      display: flex;
      flex: 1;
      gap: 0;
    }
    
    .sidebar {
      width: 180px;
      border-right: 0.5px solid var(--border-primary);
      padding: 10px;
      overflow-y: auto;
      background: var(--bg-primary);
    }
    
    .sidebar-hidden { width: 0; border: none; padding: 0; }
    
    .sidebar-section {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      margin: 10px 0 6px 0;
    }
    
    .input-group {
      display: flex;
      gap: 4px;
    }
    
    .input-group input {
      flex: 1;
      padding: 5px 6px;
      border: 0.5px solid var(--border-primary);
      border-radius: 4px;
      font-size: 12px;
    }
    
    .input-group button {
      padding: 5px 8px;
      font-size: 11px;
    }
    
    .main {
      flex: 1;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
    }
    
    .week-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .btn {
      padding: 6px 10px;
      border: 0.5px solid var(--border-primary);
      border-radius: 4px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }
    
    .btn:hover {
      background: var(--bg-secondary);
    }
    
    .btn-primary {
      background: var(--bg-success);
      color: var(--text-success);
      border-color: var(--border-secondary);
    }
    
    .btn-danger {
      color: var(--text-danger);
      border-color: var(--border-secondary);
    }
    
    .table-wrapper {
      overflow-x: auto;
      flex: 1;
    }
    
    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 600px;
      font-size: 11px;
      table-layout: fixed;
    }
    
    th {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-primary);
      padding: 4px 2px;
      text-align: center;
      font-weight: 600;
    }
    
    td {
      border: 0.5px solid var(--border-primary);
      height: 26px;
      text-align: center;
      cursor: pointer;
      transition: opacity 0.1s;
    }
    
    td:hover {
      opacity: 0.8;
    }
    
    td.time-label {
      background: var(--bg-secondary);
      color: var(--text-secondary);
      cursor: default;
      padding: 0 4px;
      font-weight: 600;
      font-size: 10px;
      width: 50px;
    }
    
    td.empty {
      background: var(--bg-primary);
    }
    
    td.booked {
      font-size: 9px;
      font-weight: 600;
      cursor: default;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2px;
      line-height: 1.2;
    }
    
    td.selected {
      background: #c8c2ff;
      color: #4a3f8f;
      font-weight: 600;
    }
    
    .footer {
      border-top: 0.5px solid var(--border-primary);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-primary);
    }
    
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      display: none;
      align-items: flex-start;
      justify-content: center;
      z-index: 100;
      padding-top: 80px;
      overflow-y: auto;
    }
    
    .modal.active { display: flex; }
    
    .modal-content {
      background: var(--bg-primary);
      border-radius: 8px;
      border: 0.5px solid var(--border-primary);
      padding: 16px;
      width: 300px;
      max-width: 90%;
      margin-bottom: 40px;
    }
    
    .modal-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    .modal-label {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 8px;
      margin-bottom: 3px;
      display: block;
    }
    
    .modal-input {
      width: 100%;
      padding: 6px 8px;
      border: 0.5px solid var(--border-primary);
      border-radius: 4px;
      font-size: 12px;
    }
    
    .modal-buttons {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
      margin-top: 12px;
    }
    
    .toast {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-primary);
      border: 0.5px solid var(--border-primary);
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 12px;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    
    .toast.show { opacity: 1; }
    
    .admin-badge {
      background: var(--bg-danger);
      color: var(--text-danger);
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    
    .my-badge {
      background: var(--bg-success);
      color: var(--text-success);
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .queue-item {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 7px;
      border: 0.5px solid var(--border-primary);
      border-radius: 4px;
      font-size: 11px;
    }
    
    .queue-item.active {
      background: var(--bg-info);
      border-color: var(--text-info);
    }
    
    .queue-num {
      padding: 2px 5px;
      border-radius: 3px;
      font-weight: 600;
      font-size: 10px;
      min-width: 25px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <button class="btn" onclick="toggleSidebar()">≡</button>
      <div class="header-title">🏢 강의실 예약</div>
      <div class="banner" id="banner">로딩 중...</div>
      <div class="badge" id="badge">잠김</div>
      <button class="btn" id="adminBtn" onclick="showAdminLogin()">관리자</button>
    </div>
    
    <div class="notice-section" id="noticeSection" style="display: none;"></div>
    
    <div class="main-content">
      <div class="sidebar" id="sidebar">
        <div id="sidebarContent"></div>
      </div>
      
      <div class="main">
        <div class="week-header">
          <button class="btn" onclick="changeWeek(-1)">◀</button>
          <span id="weekLabel" style="min-width: 80px; text-align: center;"></span>
          <button class="btn" onclick="changeWeek(1)">▶</button>
          <span style="flex: 1;"></span>
          <label style="font-size: 10px; display: flex; align-items: center; gap: 4px; cursor: pointer;">
            <input type="checkbox" id="testMode" onchange="toggleTestMode()">
            테스트
          </label>
        </div>
        
        <div style="display: flex; gap: 8px; flex-wrap: wrap; font-size: 11px;">
          <div style="display: flex; align-items: center; gap: 4px;">
            <div style="width: 12px; height: 12px; background: var(--bg-primary); border: 0.5px solid var(--border-primary); border-radius: 2px;"></div>
            <span>빈 칸</span>
          </div>
          <div style="display: flex; align-items: center; gap: 4px;">
            <div style="width: 12px; height: 12px; background: #c8c2ff; border-radius: 2px;"></div>
            <span>선택 중</span>
          </div>
        </div>
        
        <div class="table-wrapper">
          <table id="table"></table>
        </div>
      </div>
    </div>
    
    <div class="footer" id="footer" style="display: none;">
      <div id="footerText" style="flex: 1; font-size: 12px;"></div>
      <button class="btn" onclick="clearSelection()">취소</button>
      <button class="btn btn-primary" id="submitBtn" onclick="submitBooking()" disabled>완료</button>
    </div>
  </div>
  
  <div class="modal" id="adminModal">
    <div class="modal-content">
      <div class="modal-title">🛡️ 관리자 로그인</div>
      <label class="modal-label">비밀번호</label>
      <input type="password" class="modal-input" id="adminPassword" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doAdminLogin()">
      <div class="modal-buttons">
        <button class="btn" onclick="closeModal('adminModal')">취소</button>
        <button class="btn btn-primary" onclick="doAdminLogin()">로그인</button>
      </div>
    </div>
  </div>
  
  <div class="modal" id="bookingModal">
    <div class="modal-content">
      <div class="modal-title" id="bookingTitle">자율 예약</div>
      <div style="font-size: 13px; font-weight: 500; margin-bottom: 8px;" id="bookingRoom"></div>
      <div style="font-size: 11px; color: var(--text-secondary); margin-bottom: 8px;" id="bookingTime"></div>
      <label class="modal-label">예약자명</label>
      <input type="text" class="modal-input" id="bookingName" placeholder="성함 입력" maxlength="14">
      <label class="modal-label">메모 (선택)</label>
      <input type="text" class="modal-input" id="bookingMemo" placeholder="예: 일반화학 실험">
      <div class="modal-buttons">
        <button class="btn" onclick="closeModal('bookingModal')">취소</button>
        <button class="btn btn-primary" onclick="saveBooking()">예약</button>
      </div>
    </div>
  </div>
  
  <div class="modal" id="adminBookModal">
    <div class="modal-content">
      <div class="modal-title">강제 예약</div>
      <div style="font-size: 11px; color: var(--text-secondary); margin-bottom: 8px;" id="adminBookInfo"></div>
      <label class="modal-label">예약자명</label>
      <input type="text" class="modal-input" id="adminBookName" placeholder="">
      <label class="modal-label">메모</label>
      <input type="text" class="modal-input" id="adminBookMemo" placeholder="">
      <div class="modal-buttons">
        <button class="btn" onclick="closeModal('adminBookModal')">취소</button>
        <button class="btn btn-danger" id="deleteBtn" style="display: none;" onclick="deleteAdminBooking()">삭제</button>
        <button class="btn btn-primary" onclick="saveAdminBooking()">등록</button>
      </div>
    </div>
  </div>
  
  <div class="modal" id="adminSettingModal">
    <div class="modal-content">
      <div class="modal-title">🔐 관리자 설정</div>
      <label class="modal-label">새 비밀번호</label>
      <input type="password" class="modal-input" id="newPassword" placeholder="새 비밀번호 입력">
      <label class="modal-label">비밀번호 확인</label>
      <input type="password" class="modal-input" id="confirmPassword" placeholder="비밀번호 다시 입력" onkeydown="if(event.key==='Enter')saveAdminPassword()">
      <div style="font-size: 11px; color: var(--text-secondary); margin-top: 8px;">최소 4자 이상 입력하세요</div>
      <div class="modal-buttons">
        <button class="btn" onclick="closeModal('adminSettingModal')">취소</button>
        <button class="btn btn-primary" onclick="saveAdminPassword()">변경</button>
      </div>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>
  
  <script>
    // Constants
    const ROOMS = ['120호', '128호', '129호', '219호', '229호'];
    const SLOTS = Array.from({length: 15}, (_, i) => `${String(i+9).padStart(2, '0')}:00`);
    const DAYS = ['일', '월', '화', '수', '목', '금', '토'];
    const COLORS = [
      {bg: '#B5D4F4', tc: '#0C447C'}, {bg: '#9FE1CB', tc: '#085041'},
      {bg: '#FAC775', tc: '#633806'}, {bg: '#F5C4B3', tc: '#4A1B0C'},
      {bg: '#C0DD97', tc: '#27500A'}, {bg: '#CECBF6', tc: '#26215C'},
      {bg: '#F4C0D1', tc: '#72243E'}, {bg: '#D3D1C7', tc: '#2C2C2A'},
    ];
    
    // State 안정화 기법 (만약 LocalStorage 내 notices가 빈 문자열이거나 잘못되어있으면 자동 보정)
    let state = {
      queue: [],
      nextNum: 1,
      currentTurn: null,
      bookings: {},
      notices: [],
      nameColors: {},
      adminPassword: '0000',
    };
    
    let myNum = null;
    let myName = '';
    let selectedSlots = new Set();
    let isAdmin = false;
    let testMode = false;
    let weekOffset = 0;
    let sidebarOpen = true;
    let pendingBooking = null;
    let pendingAdminBooking = null;
    
    // Get formatted date
    const formatDate = (d) => d.toISOString().split('T')[0];
    
    // Get week dates
    function getWeekDates(offset = 0) {
      const today = new Date();
      const start = new Date(today);
      start.setDate(today.getDate() - ((today.getDay() + 6) % 7) + offset * 7);
      
      return Array.from({length: 7}, (_, i) => {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        return d;
      });
    }
    
    // Get mode (locked, queue, free)
    function getMode() {
      if (testMode) return 'free';
      
      const now = new Date();
      if (now.getDay() === 1) {
        if (now.getHours() < 9) return 'locked';
        if (now.getHours() === 9) return 'queue';
      }
      return 'free';
    }
    
    // Format countdown
    function formatCountdown(ms) {
      const s = Math.floor(ms / 1000);
      const m = Math.floor(s / 60);
      const h = Math.floor(m / 60);
      const d = Math.floor(h / 24);
      
      if (d > 0) return `${d}일 ${h % 24}시간 ${m % 60}분`;
      if (h > 0) return `${h}시간 ${m % 60}분`;
      return `${m}분 ${s % 60}초`;
    }
    
    // Key generator
    const slotKey = (date, roomIdx, timeIdx) => `${date}_${roomIdx}_${timeIdx}`;
    
    // Get or assign color by name
    function getColorByName(name) {
      if (!state.nameColors[name]) {
        const usedIndices = Object.values(state.nameColors);
        let idx = 0;
        while (usedIndices.includes(idx) && idx < COLORS.length) idx++;
        if (idx >= COLORS.length) idx = Object.keys(state.nameColors).length % COLORS.length;
        state.nameColors[name] = idx;
        saveState();
      }
      return COLORS[state.nameColors[name]];
    }
    
    // Save state to localStorage
    function saveState() {
      localStorage.setItem('classroomBooking', JSON.stringify(state));
      localStorage.setItem('myNum', JSON.stringify(myNum));
      localStorage.setItem('myName', JSON.stringify(myName));
    }
    
    // Load state from localStorage 및 안전 필터링
    function loadState() {
      const saved = localStorage.getItem('classroomBooking');
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          if (parsed && typeof parsed === 'object') {
            state = parsed;
            // 중요: notices가 배열이 아니거나 비어 있으면 배열로 보정
            if (!Array.isArray(state.notices)) {
              state.notices = [];
            }
          }
        } catch (e) {
          console.error("로컬스토리지 파싱 에러 복구 진행");
        }
      }
      
      const savedMyNum = localStorage.getItem('myNum');
      if (savedMyNum) { try { myNum = JSON.parse(savedMyNum);
