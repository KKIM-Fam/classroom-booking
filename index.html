<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>강의실 예약 시스템 (스마트 다중 제어 모드)</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f5;
      --bg-tertiary: #eeeeee;
      --bg-info: #e3f2fd;
      --bg-success: #e8f5e9;
      --bg-warning: #fff3e0;
      --bg-danger: #ffebee;
      --text-primary: #212121;
      --text-secondary: #757575;
      --text-tertiary: #9e9e9e;
      --text-info: #1976d2;
      --text-success: #388e3c;
      --text-warning: #f57c00;
      --text-danger: #d32f2f;
      --border-primary: #e0e0e0;
      --border-secondary: #bdbdbd;
      --border-tertiary: #9e9e9e;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; background: var(--bg-secondary); color: var(--text-primary); font-size: 13px; }
    .container { display: flex; flex-direction: column; min-height: 100vh; }
    .header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--bg-primary); border-bottom: 0.5px solid var(--border-primary); flex-wrap: wrap; }
    .header-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .banner { flex: 1; min-width: 100px; text-align: center; font-size: 11px; border-radius: 4px; padding: 5px 8px; background: var(--bg-secondary); color: var(--text-secondary); }
    .badge { font-size: 11px; padding: 3px 8px; border-radius: 4px; white-space: nowrap; }
    .badge-locked { background: var(--bg-danger); color: var(--text-danger); }
    .badge-queue { background: var(--bg-warning); color: var(--text-warning); font-weight: bold; }
    .badge-free { background: var(--bg-success); color: var(--text-success); }
    .notice-section { max-height: 120px; overflow-y: auto; background: var(--bg-warning); color: var(--text-warning); font-size: 12px; border-bottom: 0.5px solid var(--border-primary); padding: 8px; }
    .notice-item { background: rgba(255,255,255,0.1); padding: 6px 8px; border-radius: 3px; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .notice-text { flex: 1; line-height: 1.4; }
    .notice-item button { padding: 2px 6px; font-size: 10px; background: rgba(255,255,255,0.2); border: 0.5px solid rgba(255,255,255,0.3); color: var(--text-warning); border-radius: 2px; cursor: pointer; flex-shrink: 0; }
    .main-content { display: flex; flex: 1; gap: 0; }
    .sidebar { width: 180px; border-right: 0.5px solid var(--border-primary); padding: 10px; overflow-y: auto; background: var(--bg-primary); }
    .sidebar-section { font-size: 11px; font-weight: 600; color: var(--text-secondary); margin: 10px 0 6px 0; }
    
    .input-group { display: flex; gap: 5px; margin-top: 5px; width: 100%; }
    .input-group input { flex: 1; padding: 6px 8px; border: 1.5px solid #1976d2; border-radius: 4px; font-size: 12px; font-weight: 500; outline: none; min-width: 0; }
    .btn-submit-queue { padding: 6px 12px; background: #1976d2; color: #ffffff; font-size: 12px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; transition: background 0.15s; white-space: nowrap; flex-shrink: 0; }
    .btn-submit-queue:hover { background: #115293; }
    
    .main { flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
    .week-header { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 500; }
    .btn { padding: 6px 10px; border: 0.5px solid var(--border-primary); border-radius: 4px; background: transparent; color: var(--text-secondary); font-size: 11px; cursor: pointer; transition: all 0.15s; }
    .btn:hover { background: var(--bg-secondary); }
    .btn-primary { background: var(--bg-success); color: var(--text-success); border-color: var(--border-secondary); }
    .btn-danger { color: var(--text-danger); border-color: var(--border-secondary); background: var(--bg-danger); }
    .table-wrapper { overflow-x: auto; flex: 1; }
    table { border-collapse: collapse; width: 100%; font-size: 11px; }
    th { background: var(--bg-secondary); border: 0.5px solid var(--border-primary); padding: 3px 2px; text-align: center; font-weight: 600; font-size: 10px; }
    th.time-header { width: 50px; min-width: 50px; }
    td { border: 0.5px solid var(--border-primary); height: 26px; text-align: center; cursor: pointer; transition: opacity 0.1s; font-size: 9px; position: relative; }
    td:hover { opacity: 0.8; }
    td.time-label { background: var(--bg-secondary); color: var(--text-secondary); cursor: default; padding: 0 4px; font-weight: 600; font-size: 10px; width: 50px; }
    
    /* 하단 푸터 영역 스타일 확장 */
    .footer { border-top: 0.5px solid var(--border-primary); padding: 10px 14px; display: flex; align-items: center; gap: 8px; background: var(--bg-primary); flex-wrap: wrap; }
    .footer-admin-inputs { display: flex; gap: 6px; align-items: center; flex: 1; min-width: 280px; }
    .footer-admin-inputs input { padding: 4px 6px; font-size: 11px; border: 0.5px solid var(--border-primary); border-radius: 4px; width: 110px; }

    .modal { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); display: none; align-items: flex-start; justify-content: center; z-index: 100; padding-top: 80px; overflow-y: auto; }
    .modal.active { display: flex; }
    .modal-content { background: var(--bg-primary); border-radius: 8px; border: 0.5px solid var(--border-primary); padding: 16px; width: 300px; max-width: 90%; margin-bottom: 40px; }
    .modal-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    .modal-label { font-size: 11px; color: var(--text-secondary); margin-top: 8px; margin-bottom: 3px; display: block; }
    .modal-input { width: 100%; padding: 6px 8px; border: 0.5px solid var(--border-primary); border-radius: 4px; font-size: 12px; }
    .modal-buttons { display: flex; gap: 6px; justify-content: flex-end; margin-top: 12px; }
    .toast { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: var(--bg-primary); border: 0.5px solid var(--border-primary); border-radius: 6px; padding: 8px 16px; font-size: 12px; z-index: 200; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .admin-badge { background: var(--bg-danger); color: var(--text-danger); padding: 6px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-align: center; }
    .my-badge { background: var(--bg-success); color: var(--text-success); padding: 6px 8px; border-radius: 4px; font-size: 11px; display: flex; align-items: center; gap: 6px; }
    
    .queue-item { display: flex; align-items: center; justify-content: space-between; gap: 5px; padding: 5px 7px; border: 0.5px solid var(--border-primary); border-radius: 4px; font-size: 11px; margin-bottom: 3px; }
    .queue-item.active { background: var(--bg-info); border-color: var(--text-info); }
    .queue-info-text { flex: 1; display: flex; gap: 4px; align-items: center; }
    .btn-queue-del { background: transparent; border: none; color: var(--text-danger); font-size: 12px; font-weight: bold; cursor: pointer; padding: 0 4px; line-height: 1; }
    .btn-queue-del:hover { background: rgba(211, 47, 47, 0.1); border-radius: 2px; }

    .admin-menu-btn { width: 100%; margin-top: 6px; text-align: left; padding: 6px 8px; font-size: 11px; }
    .switch-container { display: flex; align-items: center; justify-content: space-between; background: #fffde7; padding: 8px; border-radius: 4px; border: 0.5px solid #fff59d; margin-top: 6px; }
    .switch-label { font-size: 11px; font-weight: bold; color: #f57f17; }
    .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; inset: 0; background-color: #ccc; transition: .2s; border-radius: 20px; }
    .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .2s; border-radius: 50%; }
    input:checked + .slider { background-color: #f57c00; }
    input:checked + .slider:before { transform: translateX(14px); }
    
    /* 다중 선택 슬롯 스타일 효과 */
    .selected-admin-overlay { box-shadow: inset 0 0 0 2px #ff1744 !important; background-color: rgba(255, 23, 68, 0.15) !important; }
    .selected-user-overlay { box-shadow: inset 0 0 0 2px #2979ff !important; background-color: rgba(41, 121, 255, 0.15) !important; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <button class="btn" onclick="toggleSidebar()">≡</button>
      <div class="header-title">🏢 강의실 예약 시스템</div>
      <div class="banner" id="banner">데이터 동기화 중...</div>
      <div class="badge" id="badge">확인 중</div>
      <button class="btn" id="adminBtn" onclick="showAdminLogin()">관리자</button>
    </div>
    
    <div class="notice-section" id="noticeSection" style="display: none;">
      <div id="noticeList"></div>
    </div>
    
    <div class="main-content">
      <div class="sidebar" id="sidebar">
        <div id="sidebarContent"></div>
      </div>
      
      <div class="main">
        <div class="week-header">
          <button class="btn" onclick="changeWeek(-1)">◀</button>
          <span id="weekLabel" style="min-width: 80px; text-align: center;"></span>
          <button class="btn" onclick="changeWeek(1)">▶</button>
        </div>
        
        <div class="table-wrapper">
          <table id="table"></table>
        </div>
      </div>
    </div>
    
    <div class="footer" id="footer" style="display: none;">
      <div id="footerText" style="font-size: 12px; font-weight: bold; margin-right: 10px; min-width: 100px;"></div>
      
      <div class="footer-admin-inputs" id="adminBatchFields" style="display: none;">
        <input type="text" id="batchAdminName" placeholder="예약자명 (기본: 관리자)">
        <input type="text" id="batchAdminMemo" placeholder="메모 내용 입력">
        <button class="btn btn-primary" style="background:#2979ff; color:#fff;" onclick="executeAdminBatchInsert()">⚡ 선택 슬롯 일괄 등록/잠금</button>
        <button class="btn btn-danger" onclick="executeAdminBatchDelete()">🗑️ 선택 슬롯 일괄 삭제</button>
      </div>

      <button class="btn btn-primary" id="submitBtn" onclick="submitBooking()" style="display: none;">선택 예약 확정</button>
      <button class="btn" onclick="clearSelection()">선택 취소</button>
    </div>
  </div>

  <div class="modal" id="adminModal">
    <div class="modal-content">
      <div class="modal-title">🛡️ 관리자 로그인</div>
      <label class="modal-label">비밀번호</label>
      <input type="password" class="modal-input" id="adminPassword" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doAdminLogin()">
      <div class="modal-buttons">
        <button class="btn" onclick="closeModal('adminModal')">취소</button>
        <button class="btn btn-primary" onclick="doAdminLogin()">로그인</button>
      </div>
    </div>
  </div>
  
  <div class="modal" id="bookingModal">
    <div class="modal-content">
      <div class="modal-title">자율 예약 등록</div>
      <div style="font-size: 13px; font-weight: 500; margin-bottom: 8px;" id="bookingRoom"></div>
      <div style="font-size: 11px; color: var(--text-secondary); margin-bottom: 8px;" id="bookingTime"></div>
      <label class="modal-label">예약자명</label>
      <input type="text" class="modal-input" id="bookingName" placeholder="성함 입력" maxlength="14">
      <label class="modal-label">메모 (선택)</label>
      <input type="text" class="modal-input" id="bookingMemo" placeholder="예: 생물학 실험실습">
      <div class="modal-buttons">
        <button class="btn" onclick="closeModal('bookingModal')">취소</button>
        <button class="btn btn-primary" onclick="saveBooking()">예약</button>
      </div>
    </div>
  </div>

  <div class="modal" id="adminBookModal">
    <div class="modal-content">
      <div class="modal-title" id="controlModalTitle">상세 정보 및 제어</div>
      <div style="font-size: 11px; color: var(--text-secondary); margin-bottom: 8px;" id="adminBookInfo"></div>

      <div style="background:var(--bg-secondary); padding:8px; border-radius:4px;" id="userDeleteZone">
        <p style="font-size:11px; color:var(--text-danger); margin-bottom:4px;">⚠️ 본인이 예약한 경우만 삭제 가능합니다.</p>
        <input type="text" class="modal-input" id="userDeleteNameInput" placeholder="예약자 이름을 정확히 입력하세요">
      </div>

      <div class="modal-buttons">
        <button class="btn" onclick="closeModal('adminBookModal')">닫기</button>
        <button class="btn btn-danger" id="userDeleteBtn" onclick="deleteUserBooking()">본인예약 취소</button>
      </div>
    </div>
  </div>

  <div class="modal" id="adminSettingModal">
    <div class="modal-content">
      <div class="modal-title">🔐 관리자 비밀번호 변경</div>
      <label class="modal-label">새 비밀번호</label>
      <input type="password" class="modal-input" id="newPassword" placeholder="새 비밀번호 입력">
      <label class="modal-label">비밀번호 확인</label>
      <input type="password" class="modal-input" id="confirmPassword" placeholder="비밀번호 재입력" onkeydown="if(event.key==='Enter')saveAdminPassword()">
      <div class="modal-buttons">
        <button class="btn" onclick="closeModal('adminSettingModal')">취소</button>
        <button class="btn btn-primary" onclick="saveAdminPassword()">변경하기</button>
      </div>
    </div>
  </div>

  <div class="modal" id="clearConfirmModal">
    <div class="modal-content">
      <div class="modal-title" style="color:var(--text-danger);">⚠️ 데이터 전체 초기화</div>
      <p style="font-size:12px; margin-bottom:8px; line-height:1.4;">현재 저장된 <b>모든 예약 내역과 대기 목록이 영구 삭제</b>됩니다. 진행하시려면 관리자 비밀번호를 입력하세요.</p>
      <input type="password" class="modal-input" id="clearPasswordInput" placeholder="관리자 비밀번호 입력">
      <div class="modal-buttons">
        <button class="btn" onclick="closeModal('clearConfirmModal')">취소</button>
        <button class="btn btn-danger" onclick="executeClearAll()">전체 삭제 실행</button>
      </div>
    </div>
  </div>

  <div class="modal" id="excelUploadModal">
    <div class="modal-content" style="width: 340px;">
      <div class="modal-title">📅 고정 시간표 일괄 업로드</div>
      <p style="font-size:11px; color:var(--text-secondary); margin-bottom:10px; line-height:1.4;">
        지정한 기간 동안 매주 동일하게 반복 적용될 엑셀(CSV) 시간표를 업로드합니다.
      </p>
      
      <label class="modal-label">📍 1. 기간 설정 (시작일 ~ 종료일)</label>
      <div style="display:flex; gap:4px; align-items:center;">
        <input type="date" id="excelStartDate" class="modal-input" style="padding:4px;">
        <span>~</span>
        <input type="date" id="excelEndDate" class="modal-input" style="padding:4px;">
      </div>

      <label class="modal-label">📂 2. 파일 선택 (.csv)</label>
      <input type="file" id="excelFileInput" accept=".csv" class="modal-input" style="border:none; padding:4px 0;">

      <div class="modal-buttons" style="margin-top:15px;">
        <button class="btn" onclick="closeModal('excelUploadModal')">닫기</button>
        <button class="btn btn-primary" onclick="processExcelUpload()">🚀 업로드 시작</button>
      </div>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>

  <script>
    const SUPABASE_URL = 'https://kdfxydjvexrndqgnmdqz.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_TFXKV2y0oFermMLgv49fdA_cuSrT6TJ';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const ROOMS = ['120호', '128호', '129호', '219호', '229호'];
    const SLOTS = Array.from({length: 15}, (_, i) => `${String(i+9).padStart(2, '0')}:00`);
    const DAYS = ['일', '월', '화', '수', '목', '금', '토'];
    const DAYS_ENG_MAP = { '일요일':0, '월요일':1, '화요일':2, '수요일':3, '목요일':4, '금요일':5, '토요일':6, '일':0, '월':1, '화':2, '수':3, '목':4, '금':5, '토':6 };
    
    const COLORS = [
      {bg: '#B5D4F4', tc: '#0C447C'}, {bg: '#9FE1CB', tc: '#085041'},
      {bg: '#FAC775', tc: '#633806'}, {bg: '#F5C4B3', tc: '#4A1B0C'},
      {bg: '#C0DD97', tc: '#27500A'}, {bg: '#CECBF6', tc: '#26215C'},
      {bg: '#F4C0D1', tc: '#72243E'}, {bg: '#D3D1C7', tc: '#2C2C2A'},
    ];
    
    let state = { queue: [], currentTurn: null, bookings: {}, notices: [], nameColors: {}, adminPassword: '0000', isQueueMode: false };
    let myNum = null, myName = '', selectedSlots = new Set(), isAdmin = false;
    let weekOffset = 0, sidebarOpen = true, pendingBooking = null, pendingAdminBooking = null;
    
    const formatDate = (d) => d.toISOString().split('T')[0];
    const getWeekDates = (offset = 0) => {
      const today = new Date();
      const start = new Date(today);
      start.setDate(today.getDate() - ((today.getDay() + 6) % 7) + offset * 7);
      return Array.from({length: 7}, (_, i) => { const d = new Date(start); d.setDate(start.getDate() + i); return d; });
    };
    
    function getMode() {
      if (state.isQueueMode) return 'queue';
      const now = new Date();
      if (now.getDay() === 1 && now.getHours() === 9) return 'queue';
      return 'free';
    }
    
    const slotKey = (date, roomIdx, timeIdx) => `${date}_${roomIdx}_${timeIdx}`;
    
    function getColorByName(name) {
      if (name === ' [잠금] ') return { bg: '#555555', tc: '#ffffff' };
      if (!state.nameColors[name]) {
        const idx = Object.keys(state.nameColors).length % COLORS.length;
        state.nameColors[name] = idx;
      }
      return COLORS[state.nameColors[name]];
    }

    async function syncFromSupabase() {
      try {
        const { data: noticeData } = await supabaseClient.from('notices').select('*').order('id', { ascending: true });
        if (noticeData) state.notices = noticeData;

        const { data: queueData } = await supabaseClient.from('queue').select('*').order('num', { ascending: true });
        if (queueData) {
          state.queue = queueData;
          const activeNext = queueData.find(q => !q.done);
          state.currentTurn = activeNext ? activeNext.num : null;
        }

        const { data: bookData } = await supabaseClient.from('bookings').select('*');
        if (bookData) {
          const newBookings = {};
          bookData.forEach(b => { newBookings[b.key] = { name: b.name, memo: b.memo, num: b.num }; });
          state.bookings = newBookings;
        }

        const { data: settingsData } = await supabaseClient.from('settings').select('*').single();
        if (settingsData) {
          if (settingsData.adminPassword) state.adminPassword = settingsData.settings_adminPassword || settingsData.adminPassword;
          state.isQueueMode = settingsData.isQueueMode || false;
        }

        render();
      } catch (err) { console.error('클라우드 동기화 실패:', err); }
    }

    async function initSystem() {
      const savedMyNum = localStorage.getItem('myNum');
      if (savedMyNum) myNum = JSON.parse(savedMyNum);
      const savedMyName = localStorage.getItem('myName');
      if (savedMyName) myName = JSON.parse(savedMyName);
      
      await syncFromSupabase();
      
      supabaseClient.channel('schema-db-changes')
        .on('postgres_changes', { event: '*', schema: 'public' }, () => { syncFromSupabase(); })
        .subscribe();

      setInterval(() => { render(); }, 1000);
    }
    
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
    
    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    
    function showAdminLogin() {
      if (isAdmin) { isAdmin = false; document.getElementById('adminBtn').textContent = '관리자'; selectedSlots.clear(); render(); return; }
      openModal('adminModal');
    }
    
    function doAdminLogin() {
      if (document.getElementById('adminPassword').value === state.adminPassword) {
        isAdmin = true; closeModal('adminModal'); document.getElementById('adminBtn').textContent = '관리자✓';
        selectedSlots.clear();
        showToast('✓ 관리자 권한 획득 (다중 선택 활성화)'); render();
      } else { showToast('비밀번호가 일치하지 않습니다.'); }
    }

    async function toggleQueueMode(chk) {
      try {
        const isChecked = chk.checked;
        await supabaseClient.from('settings').upsert({ id: 1, isQueueMode: isChecked });
        state.isQueueMode = isChecked;
        showToast(isChecked ? '📋 수동 강제 순번제가 활성화되었습니다.' : '🔓 자율 모드로 복귀 (자동스케줄러 반영)');
        await syncFromSupabase();

    function clickSlot(weekIdx, roomIdx, timeIdx) {
      const dates = getWeekDates(weekOffset);
      const date = formatDate(dates[weekIdx]);
      const key = slotKey(date, roomIdx, timeIdx);
      const mode = getMode();
      const existing = state.bookings[key];
      
      // 관리자 모드일 때는 무조건 다중 선택 목록에 추가/제거 하도록 설계 변경
      if (isAdmin) {
        selectedSlots.has(key) ? selectedSlots.delete(key) : selectedSlots.add(key);
        render();
        return;
      }
      
      if (existing && existing.name === ' [잠금] ') { showToast('학과 행정 또는 시험 기간 등으로 인해 잠긴 슬롯입니다.'); return; }
      
      // 일반 사용자가 기존 예약을 누른 경우 (취소 요청 모달)
      if (existing) {
        pendingAdminBooking = {key};
        document.getElementById('controlModalTitle').textContent = "예약 취소 신청";
        document.getElementById('adminBookInfo').textContent = `${ROOMS[roomIdx]} — ${date} ${SLOTS[timeIdx]} (예약자: ${existing.name})`;
        document.getElementById('userDeleteNameInput').value = '';
        openModal('adminBookModal');
        return;
      }
      
      // 순번제 모드일 때 사용자 다중 선택
      if (mode === 'queue') {
        if (myNum === null) { showToast('대기 번호를 먼저 받아주세요.'); return; }
        if (state.currentTurn !== myNum) { showToast('아직 내 입력 차례가 아닙니다.'); return; }
        selectedSlots.has(key) ? selectedSlots.delete(key) : selectedSlots.add(key);
        render(); return;
      }
      
      // 일반 자율 모드 단건 등록
      pendingBooking = {date, roomIdx, timeIdx, key};
      document.getElementById('bookingRoom').textContent = ROOMS[roomIdx];
      document.getElementById('bookingTime').textContent = `${date} ${SLOTS[timeIdx]}`;
      document.getElementById('bookingName').value = '';
      document.getElementById('bookingMemo').value = '';
      openModal('bookingModal');

    async function submitBooking() {
      if (!isAdmin) {
        const dateGroups = {};
        selectedSlots.forEach(key => {
          const date = key.split('_')[0];
          if (!dateGroups[date]) dateGroups[date] = 0;
          dateGroups[date]++;
        });

        for (const date in dateGroups) {
          const currentCount = countUserDailyBookings(date, myName);
          const totalAfterSubmit = currentCount + dateGroups[date];
          if (totalAfterSubmit > 6) {
            alert(`🚫 예약 확정 불가: [${date}] 날짜에 이미 완료된 예약과 현재 선택한 예약을 합치면 총 ${totalAfterSubmit}시간이 됩니다. 하루 최대 6시간 제한을 초과했습니다.\n(현재 대여 완료: ${currentCount}시간 / 추가 선택: ${dateGroups[date]}시간)`);
            return;
          }
        }
      }

      try {
        const batch = [];
        selectedSlots.forEach(key => { batch.push({ key, name: myName, memo: '순번제 확정', num: String(myNum) }); });
        await supabaseClient.from('bookings').insert(batch);

        myNum = null; myName = '';

        showToast('✓ 순번 예약 확정 완료');

    }

    async function processExcelUpload() {
      const startInput = document.getElementById('excelStartDate').value;
      const endInput = document.getElementById('excelEndDate').value;
      const fileInput = document.getElementById('excelFileInput');

      if (!startInput || !endInput) { alert("시작 날짜와 종료 날짜를 정확히 선택해 주세요."); return; }
      if (!fileInput.files || fileInput.files.length === 0) { alert("작성하신 CSV 시간표 파일을 선택해 주세요."); return; }

      const startDate = new Date(startInput);
      const endDate = new Date(endInput);
      if (startDate > endDate) { alert("시작일이 종료일보다 늦을 수 없습니다."); return; }

      const file = fileInput.files[0];
      const reader = new FileReader();

      reader.onload = async function(e) {
        const text = e.target.result;
        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        
        if (lines.length <= 1) { alert("헤더 외에 입력된 데이터 행이 없습니다."); return; }

        const parsedRules = [];
        for(let i=1; i<lines.length; i++) {
          const row = lines[i].split(',').map(cell => cell.replace(/^["']|["']$/g, '').trim());
          if (row.length < 4) continue;

          const dayStr = row[0];
          const roomStr = row[1];
          const timeStr = row[2];
          const nameStr = row[3];
          const memoStr = row[4] || '';

          const dayNum = DAYS_ENG_MAP[dayStr];
          const roomIdx = ROOMS.indexOf(roomStr);
          const timeIdx = SLOTS.indexOf(timeStr);

          if (dayNum === undefined || roomIdx === -1 || timeIdx === -1 || !nameStr) {
            console.warn(`행 무시됨 (잘못된 서식): ${lines[i]}`);
            continue;
          }
          parsedRules.push({ dayNum, roomIdx, timeIdx, name: nameStr, memo: memoStr });
        }

        if (parsedRules.length === 0) { alert("유효한 시간표 데이터 규칙을 찾지 못했습니다. 요일/강의실명/시간 정보를 확인하세요."); return; }

        const finalBatch = [];
        let cursor = new Date(startDate);

        while(cursor <= endDate) {
          const currentDayNum = cursor.getDay();
          const matches = parsedRules.filter(r => r.dayNum === currentDayNum);
          
          matches.forEach(match => {
            const dateStr = formatDate(cursor);
            const key = slotKey(dateStr, match.roomIdx, match.timeIdx);
            finalBatch.push({ key: key, name: match.name, memo: match.memo, num: 'admin' });
          });
          cursor.setDate(cursor.getDate() + 1);
        }

        if (finalBatch.length === 0) { alert("설정하신 기간 내에 매칭되는 요일이 한 번도 존재하지 않습니다."); return; }
        if (!confirm(`확인: 총 ${finalBatch.length}개의 슬롯 예약 데이터가 해당 기간 전반에 일괄 분산 삽입됩니다. 진행하시겠습니까?`)) return;

        try {
          const { error } = await supabaseClient.from('bookings').upsert(finalBatch);
          if (error) throw error;
          closeModal('excelUploadModal');
          fileInput.value = '';
          showToast(`🚀 고정 시간표 일괄 배포 완료! (${finalBatch.length}개 슬롯)`);
          await syncFromSupabase();
        } catch(err) { alert("Supabase 대량 삽입 실패: " + err.message); }
      };
      reader.readAsText(file, 'UTF-8');
    }

    function render() {
      const dates = getWeekDates(weekOffset);

      const badge = document.getElementById('badge');
      
      if (isAdmin) {
        badge.className = 'badge badge-locked'; badge.textContent = '🛡️ 관리자 모드';
        banner.textContent = '여러 칸을 터치해 멀티 지정한 후, 하단 컨트롤 창에서 일괄 입력 또는 일괄 삭제가 가능합니다.';

        badge.className = 'badge badge-queue'; badge.textContent = state.isQueueMode ? '📋 순번제 (관리자 강제)' : '⏰ 순번제 (월요 타이머)';
        if (state.currentTurn) {
          const q = state.queue.find(item => item.num === state.currentTurn);
          banner.textContent = `현재 순번 [${state.currentTurn}번 ${q ? q.name : ''}] 입력 진행 중...`;
        } else { banner.textContent = '대기 번호 목록이 비어있습니다.'; }
      } else {
        badge.className = 'badge badge-free'; badge.textContent = '🔓 자율 예약';
        banner.textContent = '빈 칸을 터치하여 예약하거나, 등록한 예약을 클릭해 취소할 수 있습니다.';
      }
      
      const noticeSection = document.getElementById('noticeSection');
      if (state.notices.length > 0) {
        noticeSection.style.display = 'block';
        document.getElementById('noticeList').innerHTML = state.notices.map(n => `<div class="notice-item"><div class="notice-text">📢 ${n.text}</div>${isAdmin ? `<button onclick="deleteNotice(${n.id})">×</button>` : ''}</div>`).join('');
      } else { noticeSection.style.display = 'none'; }
      
      document.getElementById('weekLabel').textContent = `${dates[0].getMonth()+1}/${dates[0].getDate()} ~ ${dates[6].getMonth()+1}/${dates[6].getDate()}`;
      
      // ── 한국어 IME 보호: queueInput 포커스 중에는 사이드바 DOM을 재빌드하지 않음 ──
      const queueInputEl = document.getElementById('queueInput');
      const queueInputFocused = (document.activeElement === queueInputEl);

      const sidebar = document.getElementById('sidebarContent');

      if (queueInputFocused) {
        // ── 포커스 중: 입력란은 절대 건드리지 않고, 대기목록 wrapper만 갱신 ──
        const queueListSection = document.getElementById('queueListSection');
        if (queueListSection) {
          if (state.queue.length > 0) {
            let qHtml = `<div class="sidebar-section" style="margin-top:15px;">📋 실시간 대기 목록</div>`;
            state.queue.forEach(q => { qHtml += `<div class="queue-item ${q.num === state.currentTurn ? 'active' : ''}"><b>${q.num}번</b> ${q.name} [${q.done ? '완료' : '대기'}]</div>`; });

          } else {
            queueListSection.innerHTML = '';
          }
        }
      } else {
        // ── 포커스 없을 때: 사이드바 전체 재빌드 ──
        if (isAdmin) {
          let adminSidebarHtml = `
            <div class="admin-badge">🛡️ 관리자 컨트롤 허브</div>
            <div class="switch-container">
              <span class="switch-label">📋 강제 순번제 모드</span>
              <label class="switch">
                <input type="checkbox" id="queueModeToggle" onchange="toggleQueueMode(this)" ${state.isQueueMode ? 'checked' : ''}>
                <span class="slider"></span>
              </label>
            </div>
            <button class="btn admin-menu-btn" style="background:#e3f2fd; color:#1565c0; font-weight:bold; margin-top:10px;" onclick="openModal('excelUploadModal')">📅 고정 시간표 엑셀 업로드</button>
            <button class="btn admin-menu-btn" style="background:transparent; border:0.5px dashed var(--border-tertiary); font-size:10px; color:var(--text-secondary); margin-top:2px;" onclick="downloadExcelTemplate()">📥 샘플 엑셀(CSV) 다운로드</button>
            <button class="btn admin-menu-btn" style="background:#fff3e0; color:#e65100; margin-top:10px;" onclick="lockEntireRoomDay()">🔒 강의실 하루 통째 잠금</button>
            <button class="btn admin-menu-btn" style="background:#e8f5e9; color:#1b5e20;" onclick="downloadCSVExport()">📊 전체 내역 엑셀 다운로드</button>
            <button class="btn admin-menu-btn" style="background:#ffebee; color:#b71c1c;" onclick="requestClearAll()">🔥 전체 데이터 초기화</button>
            <hr style="margin:10px 0; border:none; border-top:0.5px solid var(--border-primary);">
            <textarea id="noticeInput" style="width:100%; font-size:11px; padding:4px;" placeholder="공지사항 내용 입력"></textarea>
            <button class="btn btn-primary" style="width:100%; margin-top:4px;" onclick="postNotice()">공지 배포</button>
            <button class="btn" style="width:100%; margin-top:10px;" onclick="openModal('adminSettingModal')">암호 변경</button>
            <hr style="margin:15px 0; border:none; border-top:0.5px solid var(--border-primary);">
            <div class="sidebar-section">⚙️ 대기 제어/삭제 명단</div>
          `;
          if (state.queue.length > 0) {
            state.queue.forEach(q => {
              adminSidebarHtml += `
                <div class="queue-item ${q.num === state.currentTurn ? 'active' : ''}">
                  <div class="queue-info-text"><b>${q.num}번</b> ${q.name} [${q.done ? '완료' : '대기'}]</div>
                  <button class="btn-queue-del" onclick="deleteQueueItem(${q.num}, '${q.name}')" title="강제 삭제">×</button>
                </div>`;
            });
          } else { adminSidebarHtml += `<div style="font-size:11px; color:var(--text-secondary); padding:4px;">대기자가 없습니다.</div>`; }
          sidebar.innerHTML = adminSidebarHtml;
        } else {
          if (mode !== 'queue') {
            // 순번제 모드가 아닐 때는 대기 관련 UI 전체 숨김
            sidebar.innerHTML = '';
          } else if (myNum !== null) {
            sidebar.innerHTML = `<div class="my-badge">내 순번: ${myNum}번 (${myName})</div>`;
          } else {
            // 대기목록 wrapper(id=queueListSection)를 함께 구조에 포함해서 생성
            let queueHtml = '';
            if (state.queue.length > 0) {
              queueHtml = `<div class="sidebar-section" style="margin-top:15px;">📋 실시간 대기 목록</div>`;
              state.queue.forEach(q => { queueHtml += `<div class="queue-item ${q.num === state.currentTurn ? 'active' : ''}"><b>${q.num}번</b> ${q.name} [${q.done ? '완료' : '대기'}]</div>`; });
            }
            sidebar.innerHTML = `
              <div class="sidebar-section">🎫 대기 순번 등록</div>
              <div class="input-group">
                <input type="text" id="queueInput" placeholder="이름 입력" onkeydown="if(event.key==='Enter')joinQueue()">
                <button class="btn-submit-queue" onclick="joinQueue()">등록</button>
              </div>
              <div id="queueListSection">${queueHtml}</div>`;
          }
        }
      }
      
      let tableHtml = '<thead><tr><th class="time-header">시간</th>';
      dates.forEach(d => { tableHtml += `<th colspan="5">${d.getMonth()+1}/${d.getDate()} (${DAYS[d.getDay()]})</th>`; });
      tableHtml += '</tr><tr><th></th>';
      dates.forEach(() => { ROOMS.forEach(r => { tableHtml += `<th>${r}</th>`; }); });
      tableHtml += '</tr></thead><tbody>';
      
      SLOTS.forEach((slot, si) => {
        tableHtml += `<tr><td class="time-label">${slot}</td>`;
        dates.forEach((d, di) => {
          const date = formatDate(d);
          ROOMS.forEach((r, ri) => {
            const key = slotKey(date, ri, si);
            const booking = state.bookings[key];
            const isSelected = selectedSlots.has(key);
            
            let cellStyle = '';
            let cellText = '';
            let cellClass = '';
            let clickEvt = `onclick="clickSlot(${di}, ${ri}, ${si})"`;
            
            if (booking) {
              const color = getColorByName(booking.name);
              cellStyle = `background-color: ${color.bg}; color: ${color.tc}; font-weight:bold;`;
              cellText = booking.name;
            }
            
            // 다중 선택 시 테두리 시각 보정 테두리 클래스 바인딩 (관리자는 빨간색, 유저는 파란색)
            if (isSelected) {
              cellClass = isAdmin ? 'selected-admin-overlay' : 'selected-user-overlay';
              if(!booking) cellText = '✓';
            }
            
            tableHtml += `<td class="${cellClass}" style="${cellStyle}" ${clickEvt}>${cellText}</td>`;
          });
        });
        tableHtml += '</tr>';
      });
      tableHtml += '</tbody>';
      document.getElementById('table').innerHTML = tableHtml;
      
      // 하단 푸터 바 렌더링 동적 핸들링
      const footer = document.getElementById('footer');
      const submitBtn = document.getElementById('submitBtn');
      const adminBatchFields = document.getElementById('adminBatchFields');
      const isMyTurn = myNum !== null && myNum === state.currentTurn && mode === 'queue';
      
      if (selectedSlots.size > 0 || isMyTurn) {
        footer.style.display = 'flex';
        document.getElementById('footerText').textContent = `선택된 슬롯: ${selectedSlots.size}개`;
        
        if (isAdmin) {
          adminBatchFields.style.display = 'flex';
          submitBtn.style.display = 'none';
        } else {
          adminBatchFields.style.display = 'none';
          submitBtn.style.display = 'block';
          submitBtn.disabled = selectedSlots.size === 0;
        }
      } else { footer.style.display = 'none'; }
    }
    
    window.addEventListener('click', (e) => { if (e.target.classList.contains('modal')) e.target.classList.remove('active'); });
    initSystem();
  </script>
</body>
</html>
