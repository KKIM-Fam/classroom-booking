<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>강의실 예약 시스템</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
    .main-container { display: flex; gap: 20px; }
    #sidebar { width: 250px; background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
    input { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
    button { width: 100%; padding: 8px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    td { border: 1px solid #ddd; padding: 10px; text-align: center; cursor: pointer; }
  </style>
</head>
<body>

<div class="main-container">
  <div id="sidebar">
    <h3>대기 순번 등록</h3>
    <input type="text" id="queueInput" placeholder="이름을 입력하세요">
    <button onclick="joinQueue()">등록하기</button>
    <hr>
    <div id="queueList"></div>
  </div>
  
  <div style="flex: 1;">
    <table id="bookingTable">
      <tr><td>9:00</td><td onclick="clickSlot('9_0')">예약 가능</td></tr>
      <tr><td>10:00</td><td onclick="clickSlot('10_0')">예약 가능</td></tr>
    </table>
  </div>
</div>

<script>
  // 1. Supabase 연결
  const supabase = supabase.createClient('https://kdfxydjvexrndqgnmdqz.supabase.co', 'sb_publishable_TFXKV2y0oFermMLgv49fdA_cuSrT6TJ');
  
  let bookings = {};
  let queue = [];

  // 2. 데이터 가져오기 및 초기화
  async function fetchData() {
    const { data: bData } = await supabase.from('bookings').select('*');
    const { data: qData } = await supabase.from('queue').select('*');
    
    if (bData) bookings = bData.reduce((acc, cur) => ({...acc, [cur.key]: cur}), {});
    if (qData) queue = qData;
    
    updateUI();
  }

  // 3. 화면 갱신 (입력창 보호를 위해 HTML 통교체 대신 데이터만 갱신)
  function updateUI() {
    const listDiv = document.getElementById('queueList');
    listDiv.innerHTML = queue.map(q => `<div>${q.num}번: ${q.name}</div>`).join('');
  }

  // 4. 예약/삭제 처리
  async function clickSlot(key) {
    const item = bookings[key];
    if (item && item.num === 'admin') {
      alert('🔒 관리자 권한으로 고정된 항목입니다.');
      return;
    }
    alert('이 슬롯을 예약하시겠습니까?');
  }

  // 5. 대기열 추가
  async function joinQueue() {
    const name = document.getElementById('queueInput').value;
    if (!name) return alert('이름을 입력하세요.');
    
    await supabase.from('queue').insert([{ name, done: false }]);
    document.getElementById('queueInput').value = ''; // 등록 성공 시 비우기
    fetchData();
  }

  // 초기 실행
  fetchData();
  supabase.channel('public').on('postgres_changes', { event: '*', schema: 'public' }, fetchData).subscribe();
</script>

</body>
</html>
