<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>강의실 예약 시스템</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f5;
      --bg-tertiary: #eeeeee;
      --bg-info: #e3f2fd;
      --bg-success: #e8f5e9;
      --bg-warning: #fff3e0;
      --bg-danger: #ffebee;
      --text-primary: #212121;
      --text-secondary: #757575;
      --text-tertiary: #9e9e9e;
      --text-info: #1976d2;
      --text-success: #388e3c;
      --text-warning: #f57c00;
      --text-danger: #d32f2f;
      --border-primary: #e0e0e0;
      --border-secondary: #bdbdbd;
      --border-tertiary: #9e9e9e;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; background: var(--bg-secondary); color: var(--text-primary); font-size: 13px; }
    .container { display: flex; flex-direction: column; min-height: 100vh; }
    .header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--bg-primary); border-bottom: 0.5px solid var(--border-primary); flex-wrap: wrap; }
    .header-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .banner { flex: 1; min-width: 100px; text-align: center; font-size: 11px; border-radius: 4px; padding: 5px 8px; background: var(--bg-secondary); color: var(--text-secondary); }
    .badge { font-size: 11px; padding: 3px 8px; border-radius: 4px; white-space: nowrap; }
    .badge-locked { background: var(--bg-danger); color: var(--text-danger); }
    .badge-queue { background: var(--bg-warning); color: var(--text-warning); }
    .badge-free { background: var(--bg-success); color: var(--text-success); }
    .notice-section { max-height: 120px; overflow-y: auto; background: var(--bg-warning); color: var(--text-warning); font-size: 12px; border-bottom: 0.5px solid var(--border-primary); padding: 8px; }
    .notice-item { background: rgba(255,255,255,0.1); padding: 6px 8px; border-radius: 3px; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .notice-text { flex: 1; line-height: 1.4; }
    .notice-item button { padding: 2px 6px; font-size: 10px; background: rgba(255,255,255,0.2); border: 0.5px solid rgba(255,255,255,0.3); color: var(--text-warning); border-radius: 2px; cursor: pointer; flex-shrink: 0; }
    .main-content { display: flex; flex: 1; gap: 0; }
    .sidebar { width: 180px; border-right: 0.5px solid var(--border-primary); padding: 10px; overflow-y: auto; background: var(--bg-primary); }
    .sidebar-hidden { width: 0; border: none; padding: 0; }
    .sidebar-section { font-size: 11px; font-weight: 600; color: var(--text-secondary); margin: 10px 0 6px 0; }
    .input-group { display: flex; gap: 4px; }
    .input-group input { flex: 1; padding: 5px 6px; border: 0.5px solid var(--border-primary); border-radius: 4px; font-size: 12px; }
    .input-group button { padding: 5px 8px; font-size: 11px; }
    .main { flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
    .week-header { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 500; }
    .btn { padding: 6px 10px; border: 0.5px solid var(--border-primary); border-radius: 4px; background: transparent; color: var(--text-secondary); font-size: 11px; cursor: pointer; transition: all 0.15s; }
    .btn:hover { background: var(--bg-secondary); }
    .btn-primary { background: var(--bg-success); color: var(--text-success); border-color: var(--border-secondary); }
    .btn-danger { color: var(--text-danger); border-color: var(--border-secondary); }
    .table-wrapper { overflow-x: auto; flex: 1; }
    table { border-collapse: collapse; width: 100%; font-size: 11px; }
    th { background: var(--bg-secondary); border: 0.5px solid var(--border-primary); padding: 3px 2px; text-align: center; font-weight: 600; font-size: 10px; }
    th.time-header { width: 50px; min-width: 50px; }
    td { border: 0.5px solid var(--border-primary); height: 26px; text-align: center; font-size: 9px; position: relative; }
    td.empty { background: var(--bg-primary); cursor: pointer; }
    td.empty:hover { background: var(--bg-secondary); }
    td.time-label { background: var(--bg-secondary); color: var(--text-secondary); cursor: default; padding: 0 4px; font-weight: 600; font-size: 10px; width: 50px; }
    td.booked { font-size: 9px; font-weight: 600; display: flex; align-items: center; justify-content: center; padding: 2px; line-height: 1.2; position: relative; cursor: pointer; }
    td.booked:hover::after { content: '✕'; position: absolute; top: 4px; right: 4px; background: var(--text-danger); color: white; width: 14px; height: 14px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
    td.selected { background: #c8c2ff !important; color: #4a3f8f !important; font-weight: 600; cursor: pointer; }
    .footer { border-top: 0.5px solid var(--border-primary); padding: 10px 14px; display: flex; align-items: center; gap: 8px; background: var(--bg-primary); position: sticky; bottom: 0; z-index: 50; }
    .modal { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); display: none; align-items: flex-start; justify-content: center; z-index: 100; padding-top: 80px; overflow-y: auto; }
    .modal.active { display: flex; }
    .modal-content { background: var(--bg-primary); border-radius: 8px; border: 0.5px solid var(--border-primary); padding: 16px; width: 300px; max-width: 90%; margin-bottom: 40px; }
    .modal-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    .modal-label { font-size: 11px; color: var(--text-secondary); margin-top: 8px; margin-bottom: 3px; display: block; }
    .modal-input { width: 100%; padding: 6px 8px; border: 0.5px solid var(--border-primary); border-radius: 4px; font-size: 12px; }
    .modal-buttons { display: flex; gap: 6px; justify-content: flex-end; margin-top: 12px; }
    .toast { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: var(--bg-primary); border: 0.5px solid var(--border-primary); border-radius: 6px; padding: 8px 16px; font-size: 12px; z-index: 200; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .admin-badge { background: var(--bg-danger); color: var(--text-danger); padding: 6px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .my-badge { background: var(--bg-success); color: var(--text-success); padding: 6px 8px; border-radius: 4px; font-size: 11px; display: flex; align-items: center; gap: 6px; justify-content: space-between; width: 100%; }
    .queue-item { display: flex; align-items: center; gap: 5px; padding: 5px 7px; border: 0.5px solid var(--border-primary); border-radius: 4px; font-size: 11px; }
    .queue-item.active { background: var(--bg-info); border-color: var(--text-info); font-weight: bold; }
    .queue-item.done { opacity: 0.5; background: var(--bg-tertiary); }
    .queue-num { padding: 2px 5px; border-radius: 3px; font-weight: 600; font-size: 10px; min-width: 25px; text-align: center; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <button class="btn" onclick="toggleSidebar()">≡</button>
      <div class="header-title">🏢 강의실 예약 (Supabase)</div>
      <div class="banner" id="banner">로딩 중...</div>
      <div class="badge" id="badge">잠김</div>
      <button class="btn" id="adminBtn" onclick="showAdminLogin()">관리자</button>
    </div>
    
    <div class="notice-section" id="noticeSection" style="display: none;">
      <div id="noticeList"></div>
    </div>
    
    <div class="main-content">
      <div class="sidebar" id="sidebar">
        <div id="sidebarContent"></div>
      </div>
      
      <div class="main">
        <div class="week-header">
          <button class="btn" onclick="changeWeek(-1)">◀</button>
          <span id="weekLabel" style="min-width: 80px; text-align: center;"></span>
          <button class="btn" onclick="changeWeek(1)">▶</button>
          <span style="flex: 1;"></span>
          <label style="font-size: 11px; display: flex; align-items: center; gap: 4px; cursor: pointer; background: #fff3e0; padding: 4px 8px; border-radius: 4px; border: 0.5px solid #f57c00;">
            <input type="checkbox" id="testMode" onchange="toggleTestMode()"> ⚙️ 순번제 테스트 모드
          </label>
        </div>
        
        <div style="display: flex; gap: 8px; flex-wrap: wrap; font-size: 11px;">
          <div style="display: flex; align-items: center; gap: 4px;">
            <div style="width: 12px; height: 12px; background: var(--bg-primary); border: 0.5px solid var(--border-primary); border-radius: 2px;"></div>
            <span>빈 칸</span>
          </div>
          <div style="display: flex; align-items: center; gap: 4px;">
            <div style="width: 12px; height: 12px; background: #c8c2ff; border-radius: 2px;"></div>
            <span>선택 중</span>
          </div>
        </div>
        
        <div class="table-wrapper">
          <table id="table"></table>
        </div>
      </div>
    </div>
    
    <div class="footer" id="footer" style="display: none;">
      <div id="footerText" style="flex: 1; font-size: 12px;"></div>
      <button class="btn" onclick="clearSelection()">취소</button>
      <button class="btn btn-primary" id="submitBtn" onclick="submitBooking()" disabled>선택 슬롯 예약 완료</button>
    </div>
  </div>
  
  <div class="modal" id="adminModal">
    <div class="modal-content">
      <div class="modal-title">🛡️ 관리자 로그인</div>
      <label class="modal-label">비밀번호</label>
      <input type="password" class="modal-input" id="adminPassword" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doAdminLogin()">
      <div class="modal-buttons">
        <button class="btn" onclick="closeModal('adminModal')">취소</button>
        <button class="btn btn-primary" onclick="doAdminLogin()">로그인</button>
      </div>
    </div>
  </div>
  
  <div class="modal" id="bookingModal">
    <div class="modal-content">
      <div class="modal-title">자율 예약 등록</div>
      <div style="font-size: 13px; font-weight: 500; margin-bottom: 8px;" id="bookingRoom"></div>
      <div style="font-size: 11px; color: var(--text-secondary); margin-bottom: 8px;" id="bookingTime"></div>
      <label class="modal-label">예약자명</label>
      <input type="text" class="modal-input" id="bookingName" placeholder="성함 입력" maxlength="14">
      <label class="modal-label">메모 (선택)</label>
      <input type="text" class="modal-input" id="bookingMemo" placeholder="예: 세미나">
      <div class="modal-buttons">
        <button class="btn" onclick="closeModal('bookingModal')">취소</button>
        <button class="btn btn-primary" onclick="saveBooking()">예약</button>
      </div>
    </div>
  </div>
  
  <div class="modal" id="adminBookModal">
    <div class="modal-content">
      <div class="modal-title">🛡️ 관리자 강제 예약</div>
      <div style="font-size: 11px; color: var(--text-secondary); margin-bottom: 8px;" id="adminBookInfo"></div>
      <label class="modal-label">예약자명</label>
      <input type="text" class="modal-input" id="adminBookName" placeholder="관리자 지정 이름">
      <label class="modal-label">메모</label>
      <input type="text" class="modal-input" id="adminBookMemo" placeholder="사유 입력">
      <div class="modal-buttons">
        <button class="btn" onclick="closeModal('adminBookModal')">취소</button>
        <button class="btn btn-primary" onclick="saveAdminBooking()">등록/수정</button>
      </div>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>
  
  <script>
    const SUPABASE_URL = 'https://kdfxydjvexrndqgnmdqz.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_TFXKV2y0oFermMLgv49fdA_cuSrT'; 
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const ROOMS = ['120호', '128호', '129호', '219호', '229호'];
    const SLOTS = Array.from({length: 15}, (_, i) => `${String(i+9).padStart(2, '0')}:00`);
    const DAYS = ['일', '월', '화', '수', '목', '금', '토'];
    const COLORS = [
      {bg: '#B5D4F4', tc: '#0C447C'}, {bg: '#9FE1CB', tc: '#085041'},
      {bg: '#FAC775', tc: '#633806'}, {bg: '#F5C4B3', tc: '#4A1B0C'},
      {bg: '#C0DD97', tc: '#27500A'}, {bg: '#CECBF6', tc: '#26215C'},
      {bg: '#F4C0D1', tc: '#72243E'}, {bg: '#D3D1C7', tc: '#2C2C2A'},
    ];
    
    let state = { queue: [], nextNum: 1, currentTurn: null, bookings: {}, notices: [], nameColors: {}, adminPassword: '0000' };
    let myNum = null, myName = '', selectedSlots = new Set(), isAdmin = false, testMode = false;
    let weekOffset = 0, sidebarOpen = true, pendingBooking = null, pendingAdminBooking = null;
    
    const formatDate = (d) => d.toISOString().split('T')[0];
    const getWeekDates = (offset = 0) => {
      const today = new Date();
      const start = new Date(today);
      start.setDate(today.getDate() - ((today.getDay() + 6) % 7) + offset * 7);
      return Array.from({length: 7}, (_, i) => { const d = new Date(start); d.setDate(start.getDate() + i); return d; });
    };
    
    function getMode() {
      if (testMode) return 'queue'; // 테스트 모드가 켜지면 무조건 순번제 모드로 작동함
      const now = new Date();
      if (now.getDay() === 1) { if (now.getHours() < 9) return 'locked'; if (now.getHours() === 9) return 'queue'; }
      return 'free';
    }
    
    function formatCountdown(ms) {
      const s = Math.floor(ms / 1000), m = Math.floor(s / 60), h = Math.floor(m / 60), d = Math.floor(h / 24);
      if (d > 0) return `${d}일 ${h % 24}시간 ${m % 60}분`;
      if (h > 0) return `${h}시간 ${m % 60}분`;
      return `${m}분 ${s % 60}초`;
    }
    
    const slotKey = (date, roomIdx, timeIdx) => `${date}_${roomIdx}_${timeIdx}`;
    
    function getColorByName(name) {
      if (!state.nameColors[name]) {
        const usedIndices = Object.values(state.nameColors);
        let idx = 0;
        while (usedIndices.includes(idx) && idx < COLORS.length) idx++;
        if (idx >= COLORS.length) idx = Object.keys(state.nameColors).length % COLORS.length;
        state.nameColors[name] = idx;
        saveLocalMetadata();
      }
      return COLORS[state.nameColors[name]];
    }
    
    function saveLocalMetadata() {
      localStorage.setItem('myNum', JSON.stringify(myNum));
      localStorage.setItem('myName', JSON.stringify(myName));
      localStorage.setItem('classroomNameColors', JSON.stringify(state.nameColors));
    }
    
    function loadLocalMetadata() {
      const savedMyNum = localStorage.getItem('myNum');
      myNum = savedMyNum ? JSON.parse(savedMyNum) : null;
      const savedMyName = localStorage.getItem('myName');
      myName = savedMyName ? JSON.parse(savedMyName) : '';
      const savedColors = localStorage.getItem('classroomNameColors');
      if (savedColors) state.nameColors = JSON.parse(savedColors);
    }

    async function fetchFromSupabase() {
      const { data: dbBookings, error: err1 } = await supabaseClient.from('bookings').select('*');
      if (!err1 && dbBookings) {
        const bookingMap = {};
        dbBookings.forEach(b => {
          bookingMap[b.slot_key] = { name: b.name, memo: b.memo, num: b.num };
        });
        state.bookings = bookingMap;
      }

      const { data: dbQueue, error: err2 } = await supabaseClient.from('queue').select('*').order('num', { ascending: true });
      if (!err2 && dbQueue) {
        state.queue = dbQueue;
        const maxNum = dbQueue.length > 0 ? Math.max(...dbQueue.map(q => q.num)) : 0;
        state.nextNum = maxNum + 1;
        
        const nextTurnItem = dbQueue.find(q => !q.done);
        state.currentTurn = nextTurnItem ? nextTurnItem.num : null;
      }
      render();
    }
    
    function showToast(msg, duration = 2500) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), duration);
    }
    
    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    
    function showAdminLogin() {
      if (isAdmin) { isAdmin = false; document.getElementById('adminBtn').textContent = '관리자'; render(); return; }
      openModal('adminModal');
      setTimeout(() => document.getElementById('adminPassword').focus(), 100);
    }
    
    function doAdminLogin() {
      if (document.getElementById('adminPassword').value === state.adminPassword) {
        isAdmin = true; closeModal('adminModal'); document.getElementById('adminBtn').textContent = '관리자✓';
        showToast('✓ 관리자 모드 활성화'); render();
      } else { showToast('비밀번호가 틀렸습니다'); }
    }
    
    async function joinQueue() {
      const name = document.getElementById('queueInput')?.value?.trim();
      if (!name) { showToast('성함을 입력해 주세요'); return; }
      if (myNum !== null) { showToast('이미 순번을 받으셨습니다'); return; }
      
      const { data: dbQueue } = await supabaseClient.from('queue').select('num');
      const maxNum = dbQueue && dbQueue.length > 0 ? Math.max(...dbQueue.map(q => q.num)) : 0;
      const num = maxNum + 1;

      const { error } = await supabaseClient.from('queue').insert([{ num, name, done: false }]);
      if (error) { showToast('순번 생성 실패'); return; }
      
      myNum = num; myName = name;
      if(document.getElementById('queueInput')) document.getElementById('queueInput').value = '';
      saveLocalMetadata();
      await fetchFromSupabase();
      showToast(`✓ ${num}번 대기 번호 등록 완료`);
    }

    function abandonMyTurn() {
      if (!confirm('현재 대기 번호를 포기하고 초기화하시겠습니까?')) return;
      myNum = null; myName = '';
      saveLocalMetadata();
      render();
      showToast('대기 번호가 초기화되었습니다.');
    }
    
    function clickSlot(weekIdx, roomIdx, timeIdx) {
      const dates = getWeekDates(weekOffset);
      const date = formatDate(dates[weekIdx]);
      const key = slotKey(date, roomIdx, timeIdx);
      const mode = getMode();
      
      if (isAdmin) {
        pendingAdminBooking = {date, roomIdx, timeIdx, key};
        const d = dates[weekIdx];
        document.getElementById('adminBookInfo').textContent = `${ROOMS[roomIdx]} — ${d.getMonth()+1}/${d.getDate()} ${SLOTS[timeIdx]}`;
        document.getElementById('adminBookName').value = state.bookings[key]?.name || '';
        document.getElementById('adminBookMemo').value = state.bookings[key]?.memo || '';
        openModal('adminBookModal');
        return;
      }
      
      if (mode === 'locked') { showToast('월요일 오전 9시에 오픈됩니다.'); return; }
      
      if (mode === 'queue') {
        if (myNum === null) { showToast('왼쪽 메뉴에서 순번을 먼저 등록해 주세요.'); return; }
        if (state.currentTurn !== myNum) { 
          const qItem = state.queue.find(q => q.num === state.currentTurn);
          showToast(`현재는 ${state.currentTurn}번 ${qItem?.name || '무명'}님의 입력 순서입니다.`); 
          return; 
        }
        selectedSlots.has(key) ? selectedSlots.delete(key) : selectedSlots.add(key);
        render(); 
        return;
      }
      
      // 자율 예약 모드인 경우
      pendingBooking = {date, roomIdx, timeIdx, key};
      const d = dates[weekIdx];
      document.getElementById('bookingRoom').textContent = ROOMS[roomIdx];
      document.getElementById('bookingTime').textContent = `${d.getMonth()+1}/${d.getDate()} (${DAYS[d.getDay()]}) ${SLOTS[timeIdx]}`;
      openModal('bookingModal');
    }
    
    async function deleteBooking(key) {
      const booking = state.bookings[key];
      if (!booking) return;
      
      if (!isAdmin && booking.name !== myName) { 
        showToast('본인이 등록한 예약만 취소/삭제할 수 있습니다.'); 
        return; 
      }
      
      if (!confirm(`[${booking.name}]님의 예약을 취소하시겠습니까?`)) return;

      const { error } = await supabaseClient.from('bookings').delete().eq('slot_key', key);
      if (!error) {
        showToast('✓ 예약이 취소되었습니다.');
        await fetchFromSupabase();
      } else {
        showToast('삭제 처리에 실패했습니다.');
      }
    }
    
    async function saveBooking() {
      if (!pendingBooking) return;
      const name = document.getElementById('bookingName').value.trim();
      if (!name) { showToast('이름을 입력하세요'); return; }
      const memo = document.getElementById('bookingMemo').value.trim();

      const { error } = await supabaseClient.from('bookings').insert([{ slot_key: pendingBooking.key, name, memo, num: null }]);
      if (!error) {
        closeModal('bookingModal'); pendingBooking = null; 
        showToast('✓ 예약 완료');
        await fetchFromSupabase();
      }
    }
    
    async function saveAdminBooking() {
      if (!pendingAdminBooking) return;
      const name = document.getElementById('adminBookName').value.trim() || '관리자';
      const memo = document.getElementById('adminBookMemo').value.trim();

      const { error } = await supabaseClient.from('bookings').upsert([{ slot_key: pendingAdminBooking.key, name, memo, num: 'admin' }]);
      if (!error) {
        closeModal('adminBookModal'); pendingAdminBooking = null; 
        showToast('✓ 관리자 강제 지정 완료');
        await fetchFromSupabase();
      }
    }
    
    async function submitBooking() {
      if (selectedSlots.size === 0) { showToast('선택한 슬롯이 없습니다'); return; }
      
      const inserts = [];
      selectedSlots.forEach(key => {
        inserts.push({ slot_key: key, name: myName, memo: '순번제 예약', num: String(myNum) });
      });

      const { error: bookingErr } = await supabaseClient.from('bookings').insert(inserts);
      if (bookingErr) {
        showToast('예약 저장 실패 (이미 예약된 칸이 포함되어 있을 수 있습니다.)');
        return;
      }

      await supabaseClient.from('queue').update({ done: true }).eq('num', myNum);

      selectedSlots.clear();
      showToast(`✓ ${myName}님 예약 완료! 다음 순번으로 전환됩니다.`);
      
      // 예약 완료 후 가상 테스트 편의성을 위해 내 로컬 정보 초기화
      myNum = null; 
      myName = '';
      saveLocalMetadata();
      
      await fetchFromSupabase();
    }
    
    function clearSelection() { selectedSlots.clear(); render(); }
    function toggleSidebar() { sidebarOpen = !sidebarOpen; document.getElementById('sidebar').classList.toggle('sidebar-hidden', !sidebarOpen); }
    function changeWeek(d) { weekOffset += d; render(); }
    function toggleTestMode() { testMode = document.getElementById('testMode').checked; render(); }
    
    function render() {
      const dates = getWeekDates(weekOffset);
      const mode = getMode();
      const banner = document.getElementById('banner');
      const badge = document.getElementById('badge');
      
      if (mode === 'locked') {
        badge.className = 'badge badge-locked'; badge.textContent = '🔒 잠김';
        banner.textContent = `⏰ 오픈 대기 중`;
      } else if (mode === 'queue') {
        badge.className = 'badge badge-queue'; badge.textContent = '📋 순번제 가동 중';
        if (state.currentTurn) {
          const qItem = state.queue.find(q => q.num === state.currentTurn);
          const isMe = state.currentTurn === myNum;
          banner.innerHTML = `현재 <strong style="color:var(--text-info);">[${state.currentTurn}번 ${qItem?.name || '무명'}]</strong>님 입력 차례입니다.${isMe ? ' ➔ <span style="color:var(--text-success);"><strong>(내 차례! 칸 선택 가능)</strong></span>' : ''}`;
        } else {
          banner.textContent = '대기열에 등록된 사용자가 없습니다.';
        }
      } else {
        badge.className = 'badge badge-free'; badge.textContent = '🔓 자율예약';
        banner.textContent = '원하는 빈 공간을 눌러 자유롭게 예약하세요.';
      }
      
      // Sidebar UI 생성
      const sidebar = document.getElementById('sidebarContent');
      if (isAdmin) {
        sidebar.innerHTML = `<div class="admin-badge">🛡️ 관리자 최고권한</div><p style="margin-top:8px; font-size:11px; color:var(--text-secondary);">모든 슬롯을 클릭하여 강제 제어 및 취소가 가능합니다.</p>`;
      } else {
        if (myNum !== null) {
          const color = getColorByName(myName);
          sidebar.innerHTML = `
            <div class="sidebar-section">내 상태</div>
            <div class="my-badge" style="background:${color.bg}; color:${color.tc};">
              <span><strong>${myNum}번</strong> ${myName}</span>
              <button onclick="abandonMyTurn()" style="background:none; border:none; color:inherit; cursor:pointer; font-weight:bold; font-size:12px;">✕</button>
            </div>
          `;
        } else {
          sidebar.innerHTML = `
            <div class="sidebar-section">🎫 대기 순번 등록</div>
            <div class="input-group">
              <input type="text" id="queueInput" placeholder="이름 입력" maxlength="12" onkeydown="if(event.key==='Enter')joinQueue()">
              <button class="btn btn-primary" onclick="joinQueue()">등록</button>
            </div>
          `;
        }
        
        if (state.queue.length > 0) {
          const queueHtml = state.queue.map(q => {
            const color = getColorByName(q.name);
            const isActive = q.num === state.currentTurn && !q.done;
            return `<div class="queue-item${isActive ? ' active' : ''}${q.done ? ' done' : ''}"><span class="queue-num" style="background: ${color.bg}; color: ${color.tc};">${q.num}</span><span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${q.name}</span><span>${q.done ? '완료' : isActive ? '입력중' : '대기'}</span></div>`;
          }).join('');
          
          const queueDiv = document.createElement('div');
          queueDiv.innerHTML = `<div class="sidebar-section" style="margin-top:14px;">📋 전체 실시간 대기열</div><div style="display:flex; flex-direction:column; gap:4px; max-height:220px; overflow-y:auto;">${queueHtml}</div>`;
          sidebar.appendChild(queueDiv);
        }
      }
      
      // 시간표 그리기 로직
      let tableHtml = '<thead><tr><th class="time-header"></th>';
      dates.forEach(d => {
        const isToday = formatDate(d) === formatDate(new Date());
        tableHtml += `<th colspan="5" style="${isToday ? 'background: var(--bg-info); color: var(--text-info);' : ''}">${d.getMonth()+1}/${d.getDate()} (${DAYS[d.getDay()]})</th>`;
      });
      tableHtml += '</tr><tr><th class="time-header">시간</th>';
      dates.forEach(() => { ROOMS.forEach(r => tableHtml += `<th>${r}</th>`); });
      tableHtml += '</tr></thead><tbody>';
      
      SLOTS.forEach((slot, si) => {
        tableHtml += `<tr><td class="time-label">${slot}</td>`;
        dates.forEach((d, di) => {
          const date = formatDate(d);
          for (let ri = 0; ri < ROOMS.length; ri++) {
            const key = slotKey(date, ri, si);
            const booking = state.bookings[key];
            const isSelected = selectedSlots.has(key);
            
            let cellStyle = '';
            let cellClass = 'empty';
            let cellContent = '';
            let onClickStr = `onclick="clickSlot(${di}, ${ri}, ${si})"`;
            
            if (booking) {
              const color = getColorByName(booking.name);
              cellStyle = `background: ${color.bg}; color: ${color.tc};`;
              cellClass = 'booked';
              cellContent = booking.name;
              onClickStr = `onclick="deleteBooking('${key}')"`;
            } else if (isSelected) {
              cellClass = 'selected';
              cellContent = '✓';
            }
            
            tableHtml += `<td class="${cellClass}" style="${cellStyle}" ${onClickStr} title="${booking ? booking.name + (booking.memo ? ' ('+booking.memo+')' : '') : '비어 있음'}">${cellContent}</td>`;
          }
        });
        tableHtml += '</tr>';
      });
      tableHtml += '</tbody>';
      document.getElementById('table').innerHTML = tableHtml;
      
      // 하단 예약 확정 바(Footer) 제어
      const footer = document.getElementById('footer');
      const isMyTurn = myNum !== null && myNum === state.currentTurn && mode === 'queue';
      if (isMyTurn || (!isMyTurn && selectedSlots.size > 0)) {
        footer.style.display = 'flex';
        const count = selectedSlots.size;
        document.getElementById('footerText').innerHTML = isMyTurn ? (count === 0 ? `<strong>${myName}</strong>님, 원하는 빈 칸 시간표를 클릭해서 다중 선택해 주세요.` : `💡 <strong>${count}개 슬롯 선택됨</strong>`) : `선택 중...`;
        document.getElementById('submitBtn').disabled = count === 0;
      } else {
        footer.style.display = 'none';
      }
    }
    
    // Supabase Realtime 채널 실시간 바인딩
    supabaseClient
      .channel('table-db-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'bookings' }, fetchFromSupabase)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'queue' }, fetchFromSupabase)
      .subscribe();

    window.addEventListener('click', (e) => { if (e.target.classList.contains('modal')) e.target.classList.remove('active'); });
    
    loadLocalMetadata();
    fetchFromSupabase();
    setInterval(render, 3000); // 3초마다 시간 동기화 및 렌더링 유지
  </script>
</body>
</html>
