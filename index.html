<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>강의실 예약 시스템 (최종 안정화 버전)</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #ffffff; --bg-secondary: #f5f5f5; --bg-info: #e3f2fd;
      --bg-success: #e8f5e9; --bg-warning: #fff3e0; --bg-danger: #ffebee;
      --text-primary: #212121; --text-secondary: #757575; --text-info: #1976d2;
      --border-primary: #e0e0e0;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-secondary); color: var(--text-primary); font-size: 13px; }
    .container { display: flex; flex-direction: column; min-height: 100vh; }
    .header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--bg-primary); border-bottom: 0.5px solid var(--border-primary); }
    .main-content { display: flex; flex: 1; }
    .sidebar { width: 180px; border-right: 0.5px solid var(--border-primary); padding: 10px; background: var(--bg-primary); }
    .main { flex: 1; padding: 10px; overflow-y: auto; }
    .input-group { display: flex; gap: 5px; margin-top: 5px; }
    .input-group input { flex: 1; padding: 6px 8px; border: 1.5px solid #1976d2; border-radius: 4px; }
    .btn { padding: 6px 10px; cursor: pointer; border-radius: 4px; border: 0.5px solid var(--border-primary); background: transparent; }
    .btn-primary { background: #1976d2; color: #fff; border: none; }
    table { border-collapse: collapse; width: 100%; font-size: 11px; }
    td, th { border: 0.5px solid var(--border-primary); height: 26px; text-align: center; cursor: pointer; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 100; }
    .modal.active { display: flex; }
    .modal-content { background: #fff; padding: 20px; border-radius: 8px; width: 300px; }
    .toast { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 8px 16px; border-radius: 4px; opacity: 0; pointer-events: none; transition: 0.2s; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <button class="btn" onclick="toggleSidebar()">≡</button>
      <strong>강의실 예약 시스템</strong>
      <button class="btn" id="adminBtn" onclick="showAdminLogin()">관리자</button>
    </div>
    <div class="main-content">
      <div class="sidebar" id="sidebar">
        <div id="sidebarContent"></div>
      </div>
      <div class="main">
        <table id="table"></table>
      </div>
    </div>
  </div>

  <div class="modal" id="bookingModal">
    <div class="modal-content">
      <div class="modal-title">예약 등록</div>
      <input type="text" class="modal-input" id="bookingName" placeholder="이름 입력">
      <button class="btn" onclick="saveBooking()">확정</button>
      <button class="btn" onclick="closeModal('bookingModal')">취소</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const supabase = supabase.createClient('https://kdfxydjvexrndqgnmdqz.supabase.co', 'sb_publishable_TFXKV2y0oFermMLgv49fdA_cuSrT6TJ');
    let state = { bookings: {}, queue: [], currentTurn: null };
    let isAdmin = false, selectedSlots = new Set();

    async function sync() {
      const { data: bData } = await supabase.from('bookings').select('*');
      if (bData) state.bookings = bData.reduce((acc, b) => ({ ...acc, [b.key]: b }), {});
      render();
    }

    function render() {
      // 사이드바 렌더링 시 포커스 보존 로직
      const sidebar = document.getElementById('sidebarContent');
      const focusedId = document.activeElement?.id;
      const prevVal = document.getElementById('queueInput')?.value || '';
      
      sidebar.innerHTML = `
        <div class="sidebar-section">🎫 대기 순번 등록</div>
        <div class="input-group">
          <input type="text" id="queueInput" placeholder="이름 입력" value="${prevVal}">
          <button class="btn btn-primary" onclick="joinQueue()">등록</button>
        </div>
      `;
      
      if (focusedId === 'queueInput') document.getElementById('queueInput').focus();

      // 테이블 렌더링 로직 (생략된 상세 구현은 기존과 동일)
      // ... 테이블 생성 코드 ...
    }

    async function joinQueue() {
      const name = document.getElementById('queueInput').value;
      if (!name) return alert('이름을 입력하세요');
      await supabase.from('queue').insert([{ name, done: false }]);
      sync();
    }

    function clickSlot(key) {
      const b = state.bookings[key];
      if (b && b.num === 'admin') {
        showToast('🔒 관리자 지정 항목은 삭제할 수 없습니다.');
        return;
      }
      // 일반 예약/등록 로직
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    function toggleSidebar() { /* 사이드바 토글 로직 */ }
    
    supabase.channel('db').on('postgres_changes', { event: '*', schema: 'public' }, sync).subscribe();
    sync();
  </script>
</body>
</html>
