<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>강의실 예약 시스템 (입력 최적화 버전)</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* CSS는 이전과 동일하므로 생략 (위의 제공된 스타일 사용) */
  </style>
</head>
<body>
  <div class="container">
    <div id="sidebarContent"></div>
    <table id="table"></table>
  </div>

  <script>
    const supabase = supabase.createClient('https://kdfxydjvexrndqgnmdqz.supabase.co', 'sb_publishable_TFXKV2y0oFermMLgv49fdA_cuSrT6TJ');
    
    // 상태 변수
    let state = { bookings: {}, queue: [] };
    let queueInputVal = ""; // 입력창 값 보존용 변수
    let isAdmin = false;

    // 데이터 동기화
    async function sync() {
      const { data: bData } = await supabase.from('bookings').select('*');
      const { data: qData } = await supabase.from('queue').select('*');
      if (bData) state.bookings = bData.reduce((acc, b) => ({ ...acc, [b.key]: b }), {});
      if (qData) state.queue = qData;
      render();
    }

    // [최적화된 렌더링 함수]
    function render() {
      const sidebar = document.getElementById('sidebarContent');
      
      // 1. 현재 입력값 보존
      const inputEl = document.getElementById('queueInput');
      if (inputEl) queueInputVal = inputEl.value;

      // 2. 사이드바 HTML 재구성
      sidebar.innerHTML = `
        <div class="sidebar-section">🎫 대기 순번 등록</div>
        <div class="input-group">
          <input type="text" id="queueInput" value="${queueInputVal}" oninput="queueInputVal = this.value" placeholder="이름 입력">
          <button class="btn btn-primary" onclick="joinQueue()">등록</button>
        </div>
        <div id="queueList"></div>
      `;

      // 3. 목록 부분 갱신
      document.getElementById('queueList').innerHTML = state.queue.map(q => `
        <div>${q.num}번 ${q.name}</div>
      `).join('');
    }

    // 관리자 데이터 보호 로직
    function clickSlot(key) {
      const booking = state.bookings[key];
      
      // 관리자 데이터는 삭제 차단
      if (booking && booking.num === 'admin') {
        alert('🔒 이 슬롯은 관리자에 의해 잠금/고정된 항목입니다.');
        return;
      }
      
      // 예약 프로세스 진행
    }

    async function joinQueue() {
      if (!queueInputVal) return alert('이름을 입력하세요');
      await supabase.from('queue').insert([{ name: queueInputVal, done: false }]);
      queueInputVal = ""; // 등록 후 초기화
      sync();
    }

    // [중요] 1초마다 렌더링하는 setInterval은 사용하지 않습니다.
    // 데이터 변경 시에만 sync()가 호출되도록 설정
    supabase.channel('db').on('postgres_changes', { event: '*', schema: 'public' }, sync).subscribe();
    sync();
  </script>
</body>
</html>
